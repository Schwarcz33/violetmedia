[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Permissions-Policy = "camera=(), geolocation=(), microphone=(self)"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/tts"
  to = "/.netlify/functions/tts"
  status = 200
